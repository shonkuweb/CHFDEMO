server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com; # ⚠️ REPLACE WITH YOUR ACTUAL DOMAIN

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com www.yourdomain.com; # ⚠️ REPLACE WITH YOUR ACTUAL DOMAIN

    # ⚠️ UNCOMMENT THESE AFTER SETTING UP SSL (e.g. via Certbot / Let's Encrypt)
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Performance optimizations
    client_max_body_size 50M; # Allow large media file uploads (adjust if needed)

    # API Proxy Configuration
    location / {
        proxy_pass http://127.0.0.1:8000;
        
        # Preserve original headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSockets support (if FastAPI uses them later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeout settings for bulky R2 uploads or media parsing
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }
}
