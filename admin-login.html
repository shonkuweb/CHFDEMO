<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin Login - CHF Botanical Luxury</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Noto+Serif:wght@300..700&display=swap" rel="stylesheet" />
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4a5d4e",
                        "accent-bronze": "#a68b6a",
                        "background-dark": "#0a0a0a",
                        "surface-dark": "#141414",
                        "ivory": "#e8e4db",
                        "ivory-dim": "#b5b1a6",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Noto Serif", "serif"],
                    },
                },
            },
        }
    </script>
</head>

<body class="bg-background-dark text-ivory font-display antialiased min-h-screen flex items-center justify-center p-6 relative overflow-hidden" id="app">
    <!-- Ambient Blur -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-accent-bronze/5 rounded-full blur-[150px] pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo -->
        <div class="flex justify-center mb-12">
            <img src="https://pub-ce8688bc6c654bcfb99716f7c9373bcd.r2.dev/assets/images/chf_logo.png" alt="CHF Logo" class="w-16 h-16 rounded-full border border-white/10 shadow-2xl">
        </div>

        <div class="bg-surface-dark border border-white/10 p-10 shadow-2xl backdrop-blur-xl">
            <div class="text-center mb-8">
                <h1 class="font-serif text-3xl font-light text-ivory mb-2">Admin Portal</h1>
                <p class="text-xs uppercase tracking-[0.2em] text-accent-bronze font-bold">Secure Access</p>
            </div>

            <form @submit.prevent="handleLogin" class="space-y-6">
                <!-- Username -->
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2 font-bold">Username</label>
                    <input type="text" v-model="username" required
                        class="w-full bg-background-dark border border-white/10 px-4 py-3 text-sm text-ivory focus:outline-none focus:border-accent-bronze transition-colors placeholder:text-white/20"
                        placeholder="Enter username">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2 font-bold">Password</label>
                    <input type="password" v-model="password" required
                        class="w-full bg-background-dark border border-white/10 px-4 py-3 text-sm text-ivory focus:outline-none focus:border-accent-bronze transition-colors placeholder:text-white/20"
                        placeholder="••••••••">
                </div>

                <!-- Cloudflare Turnstile -->
                <div class="flex justify-center flex-col items-center">
                    <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2 font-bold w-full text-left">Bot Protection</label>
                    <!-- Dummy "always passes" Sitekey for Testing: 1x00000000000000000000AA -->
                    <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-theme="dark"></div>
                </div>

                <!-- Error Message -->
                <div v-if="error" class="bg-red-500/10 border border-red-500/20 text-red-400 text-xs px-4 py-3 rounded-sm flex items-start gap-2">
                    <span class="material-symbols-outlined text-[16px]">warning</span>
                    <span>{{ error }}</span>
                </div>

                <!-- Submit -->
                <button type="submit" :disabled="isLoading"
                    class="w-full bg-ivory text-background-dark hover:bg-white px-6 py-3 text-xs uppercase tracking-widest font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <span v-if="isLoading" class="material-symbols-outlined text-[16px] animate-spin">refresh</span>
                    <span>{{ isLoading ? 'Authenticating...' : 'Sign In' }}</span>
                </button>
            </form>
        </div>
        
        <p class="text-center text-[10px] uppercase tracking-widest text-gray-600 font-bold mt-8">
            &copy; 2026 CHF Botanical Luxury
        </p>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const username = ref('admin');
                const password = ref('');
                const isLoading = ref(false);
                const error = ref('');

                const handleLogin = async () => {
                    isLoading.value = true;
                    error.value = '';
                    
                    const turnstileResponse = document.querySelector('[name="cf-turnstile-response"]')?.value;

                    const formData = new FormData();
                    formData.append('username', username.value);
                    formData.append('password', password.value);
                    if (turnstileResponse) {
                        formData.append('cf_turnstile_response', turnstileResponse);
                    }

                    try {
                        const res = await fetch('/api/login', {
                            method: 'POST',
                            body: formData
                        });

                        if (!res.ok) {
                            const errData = await res.json();
                            throw new Error(errData.detail || 'Authentication failed');
                        }

                        // Success! Redirect to the protected admin page.
                        window.location.href = '/admin.html';
                        
                    } catch (err) {
                        error.value = err.message;
                        // Reset Turnstile on error
                        if (window.turnstile) {
                            window.turnstile.reset();
                        }
                    } finally {
                        isLoading.value = false;
                    }
                };

                return {
                    username,
                    password,
                    isLoading,
                    error,
                    handleLogin
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
